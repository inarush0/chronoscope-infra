services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: chronoscope
      POSTGRES_USER: chronoscope
      POSTGRES_PASSWORD: chronoscope
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronoscope"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ../chronoscope
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://chronoscope:chronoscope@postgres:5432/chronoscope
      ORIGIN: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
